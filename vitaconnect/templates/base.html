<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}VitaConnect{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1C2B2D; --mint: #2A9D8F; --mint-light: #E8F5F3; --mint-mid: #A8D8D4;
  --paper: #F4F0EA; --cream: #FAF7F2; --white: #fff;
  --gray: #8A9BA0; --gray-light: #D8E0E2;
  --red: #C8502A; --red-light: #FBF0EC;
  --amber: #E9A84A; --green: #2A7A5E;
  --font-d: 'Playfair Display', Georgia, serif;
  --font-b: 'DM Sans', system-ui, sans-serif;
  --sh: 0 2px 12px rgba(28,43,45,0.09);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-b); background: var(--cream); color: var(--ink); }
a { text-decoration: none; color: inherit; }

/* Layout */
.shell { display: grid; grid-template-columns: 230px 1fr; min-height: 100vh; }
.sidebar { background: var(--ink); padding: 1.5rem 0; display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; }
.sb-brand { padding: 0 1.25rem 1.25rem; border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.75rem; }
.sb-name { font-family: var(--font-d); font-size: 1.5rem; color: var(--paper); }
.sb-name span { color: var(--mint); }
.sb-role { font-size: 0.72rem; color: var(--gray); margin-top: 0.15rem; }
.nav { padding: 0 0.6rem; }
.nav-lbl { font-size: 0.63rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gray); padding: 0 0.6rem; margin: 0.75rem 0 0.3rem; }
.nav-item { display: flex; align-items: center; gap: 0.65rem; padding: 0.6rem 0.7rem; border-radius: 8px; color: var(--gray); font-size: 0.88rem; transition: all 0.15s; margin-bottom: 2px; }
.nav-item:hover { background: rgba(255,255,255,0.06); color: var(--paper); }
.nav-item.active { background: var(--mint); color: #fff; }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
.sb-foot { margin-top: auto; padding: 1rem 1.25rem; border-top: 1px solid rgba(255,255,255,0.08); }
.sb-user { font-size: 0.85rem; color: var(--paper); font-weight: 500; }
.sb-user-sub { font-size: 0.72rem; color: var(--gray); }
.logout { display: block; margin-top: 0.6rem; width: 100%; padding: 0.45rem; border-radius: 6px; background: rgba(200,80,42,0.15); border: 1px solid rgba(200,80,42,0.3); color: #E8956F; font-size: 0.8rem; cursor: pointer; font-family: var(--font-b); text-align: center; }
.logout:hover { background: rgba(200,80,42,0.25); }
.main { padding: 2rem 2.25rem; }
.ph { margin-bottom: 1.75rem; }
.ph h1 { font-family: var(--font-d); font-size: 1.8rem; color: var(--ink); }
.ph p { font-size: 0.88rem; color: var(--gray); margin-top: 0.2rem; }

/* Cards */
.card { background: var(--white); border: 1px solid var(--gray-light); border-radius: 12px; padding: 1.4rem; box-shadow: var(--sh); margin-bottom: 1.25rem; }
.card-h { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.card-h h2 { font-size: 1rem; font-weight: 600; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; }
.g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; margin-bottom: 1.5rem; }

/* Stat cards */
.stat { background: var(--white); border: 1px solid var(--gray-light); border-radius: 12px; padding: 1.1rem 1.3rem; box-shadow: var(--sh); position: relative; overflow: hidden; }
.stat::after { content:''; position:absolute; top:0; left:0; width:4px; height:100%; background:var(--mint); border-radius:12px 0 0 12px; }
.stat.red::after { background:var(--red); }
.stat.amber::after { background:var(--amber); }
.stat.ok::after { background:var(--green); }
.stat-lbl { font-size:0.72rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--gray); margin-bottom:0.35rem; }
.stat-val { font-family:var(--font-d); font-size:2rem; color:var(--ink); }
.stat-sub { font-size:0.8rem; color:var(--gray); margin-top:0.2rem; }

/* Buttons */
.btn { display:inline-flex; align-items:center; gap:0.4rem; padding:0.7rem 1.4rem; border-radius:8px; font-family:var(--font-b); font-size:0.9rem; font-weight:600; cursor:pointer; border:none; transition:all 0.15s; }
.btn-p { background:var(--mint); color:#fff; }
.btn-p:hover { background:#238a7c; }
.btn-o { background:transparent; color:var(--mint); border:1.5px solid var(--mint); }
.btn-o:hover { background:var(--mint-light); }
.btn-r { background:var(--red); color:#fff; }
.btn-r:hover { background:#a83f1e; }
.btn-sm { padding:0.45rem 0.9rem; font-size:0.82rem; }
.btn-full { width:100%; justify-content:center; }

/* Forms */
.fg { margin-bottom:1.1rem; }
.fl { font-size:0.75rem; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; color:var(--gray); margin-bottom:0.35rem; display:block; }
.fi { width:100%; padding:0.75rem 1rem; border:1.5px solid var(--gray-light); border-radius:8px; font-family:var(--font-b); font-size:0.92rem; color:var(--ink); background:var(--white); transition:border-color 0.2s; }
.fi:focus { outline:none; border-color:var(--mint); }
textarea.fi { resize:vertical; }
.fi-big { font-size:2rem; font-family:var(--font-d); font-weight:700; text-align:center; border:none; border-bottom:3px solid var(--mint); border-radius:0; background:transparent; }
.fi-big:focus { outline:none; }

/* Badges */
.badge { display:inline-flex; align-items:center; gap:0.25rem; padding:0.18rem 0.55rem; border-radius:99px; font-size:0.72rem; font-weight:600; }
.b-g { background:#E8F5F0; color:var(--green); }
.b-r { background:var(--red-light); color:var(--red); }
.b-a { background:#FEF7E8; color:#9B6B1A; }
.b-gr { background:var(--mint-light); color:var(--mint); }

/* Table */
.tw { overflow-x:auto; }
table { width:100%; border-collapse:collapse; font-size:0.87rem; }
th { padding:0.65rem 0.9rem; text-align:left; font-size:0.68rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); border-bottom:2px solid var(--gray-light); background:var(--cream); }
td { padding:0.85rem 0.9rem; border-bottom:1px solid var(--gray-light); vertical-align:middle; }
tr:hover td { background:var(--cream); }
tr:last-child td { border-bottom:none; }

/* Alert / notif */
.notif { display:flex; align-items:flex-start; gap:0.75rem; padding:0.9rem 1.1rem; border-radius:10px; margin-bottom:1rem; }
.notif-r { background:var(--red-light); border:1px solid #E8A090; }
.notif-g { background:var(--mint-light); border:1px solid var(--mint-mid); }
.notif-a { background:#FEF7E8; border:1px solid var(--amber); }
.notif-ico { font-size:1.1rem; flex-shrink:0; margin-top:0.1rem; }
.notif-b { flex:1; }
.notif-t { font-weight:600; font-size:0.88rem; }
.notif-d { font-size:0.81rem; color:var(--gray); margin-top:0.15rem; }

/* Status boxes */
.status-ok { background:#E8F5F0; border:1.5px solid var(--green); border-radius:12px; padding:1.1rem; text-align:center; }
.status-hi { background:var(--red-light); border:1.5px solid var(--red); border-radius:12px; padding:1.1rem; text-align:center; }
.status-wa { background:#FEF7E8; border:1.5px solid var(--amber); border-radius:12px; padding:1.1rem; text-align:center; }
.st-ico { font-size:1.8rem; margin-bottom:0.35rem; }
.st-txt { font-size:0.95rem; font-weight:600; }
.st-sub { font-size:0.82rem; color:var(--gray); margin-top:0.2rem; }

/* Messages */
.thread { display:flex; flex-direction:column; gap:0.65rem; max-height:320px; overflow-y:auto; padding:0.25rem 0 0.5rem; }
.msg { max-width:78%; padding:0.7rem 0.9rem; border-radius:12px; font-size:0.87rem; line-height:1.5; }
.msg-me { background:var(--mint); color:#fff; align-self:flex-end; border-radius:12px 12px 2px 12px; }
.msg-other { background:var(--gray-light); color:var(--ink); align-self:flex-start; border-radius:12px 12px 12px 2px; }
.msg-time { font-size:0.68rem; opacity:0.7; margin-top:0.2rem; }
.msg-row { display:flex; gap:0.5rem; margin-top:0.75rem; }
.msg-inp { flex:1; padding:0.65rem 0.9rem; border:1.5px solid var(--gray-light); border-radius:8px; font-family:var(--font-b); font-size:0.87rem; }
.msg-inp:focus { outline:none; border-color:var(--mint); }

/* Progress bars */
.pb-wrap { margin-bottom:0.75rem; }
.pb-head { display:flex; justify-content:space-between; font-size:0.83rem; margin-bottom:0.25rem; }
.pb { height:7px; background:var(--gray-light); border-radius:4px; overflow:hidden; }
.pb-fill { height:100%; border-radius:4px; background:var(--mint); }
.pb-fill.ok { background:var(--green); }
.pb-fill.red { background:var(--red); }

/* Flash messages */
.flash { padding:0.8rem 1.1rem; border-radius:8px; margin-bottom:1rem; font-size:0.88rem; font-weight:500; }
.flash-s { background:#E8F5F0; border:1px solid var(--green); color:var(--green); }
.flash-e { background:var(--red-light); border:1px solid var(--red); color:var(--red); }

/* Separator */
.sep { height:1px; background:var(--gray-light); margin:1.1rem 0; }

/* Measure boxes */
.mbox { background:var(--cream); border-radius:10px; padding:1.25rem; text-align:center; }
.mbox-lbl { font-size:0.7rem; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--gray); margin-bottom:0.6rem; }

/* Patient list */
.pat-row { display:flex; align-items:center; gap:0.9rem; padding:0.8rem 0.9rem; border-radius:10px; cursor:pointer; border:1px solid var(--gray-light); background:var(--white); margin-bottom:0.4rem; transition:all 0.15s; }
.pat-row:hover { border-color:var(--mint); background:var(--mint-light); }
.pat-row.alert { border-color:var(--red); background:var(--red-light); }
.avatar { width:40px; height:40px; border-radius:50%; background:var(--mint); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:0.85rem; flex-shrink:0; }
.avatar.red { background:var(--red); }
.pat-info { flex:1; }
.pat-name { font-weight:600; font-size:0.88rem; }
.pat-sub { font-size:0.78rem; color:var(--gray); }
.pat-val { text-align:right; }
.pat-m { font-family:var(--font-d); font-size:1.05rem; font-weight:700; }
.c-ok { color:var(--green); } .c-r { color:var(--red); } .c-a { color:var(--amber); }
.pat-d { font-size:0.72rem; color:var(--gray); }

@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.fade { animation:fadeIn 0.3s ease forwards; }
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
